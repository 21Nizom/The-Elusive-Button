<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Summer Challenge</title>
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
            outline: none;
        }
        
        body {
            margin: 0; height: 100vh; overflow: hidden; touch-action: none;
            background: radial-gradient(circle at center, #800020 0%, #4a0404 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        #game-area {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 5;
        }

        #evade-button {
            position: absolute;
            padding: 18px 36px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #fff;
            background: rgba(255, 183, 213, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            transition: all 0.15s ease-out;
            pointer-events: auto;
            z-index: 10;
            transform: translate3d(0,0,0);
        }

        #final-message {
            position: absolute;
            width: 100%; text-align: center;
            top: 50%; transform: translateY(-50%);
            opacity: 0; transition: opacity 2s ease;
            pointer-events: none;
        }

        .main-text {
            display: block; font-size: 30px; color: #ffb7d5;
            letter-spacing: 2px; text-shadow: 0 0 15px rgba(255,183,213,0.4);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="game-area">
        <button id="evade-button">Catch Me</button>
    </div>

    <div id="final-message">
        <span class="main-text">See you in the summer</span>
        <span style="color: rgba(255,183,213,0.5); font-size: 12px; letter-spacing: 4px;">CAN'T WAIT</span>
    </div>

    <script>
        const btn = document.getElementById('evade-button');
        const finalMsg = document.getElementById('final-message');
        const area = document.getElementById('game-area');
        
        let count = 0;
        let isDone = false;
        const goal = 20;

        function handleInput(e) {
            if (isDone) return;

            // Берем координаты либо мыши, либо первого касания
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);

            const rect = btn.getBoundingClientRect();
            const btnX = rect.left + rect.width / 2;
            const btnY = rect.top + rect.height / 2;

            // Дистанция между пальцем и кнопкой
            const dist = Math.hypot(x - btnX, y - btnY);

            // Если палец ближе 150 пикселей - кнопка убегает
            if (dist < 150) {
                count++;
                if (navigator.vibrate) navigator.vibrate(10);

                const margin = 80;
                const newX = Math.random() * (window.innerWidth - rect.width - margin) + margin/2;
                const newY = Math.random() * (window.innerHeight - rect.height - margin) + margin/2;

                btn.style.left = `${newX}px`;
                btn.style.top = `${newY}px`;

                if (count >= goal) {
                    isDone = true;
                    btn.textContent = "Got it!";
                    btn.style.background = "rgba(255, 183, 213, 0.9)";
                }
            }
        }

        // Слушаем касания по всей области экрана
        area.addEventListener('touchstart', (e) => {
            handleInput(e);
            // Не даем скроллить страницу, пока она пытается поймать кнопку
        }, { passive: false });

        area.addEventListener('touchmove', (e) => {
            handleInput(e);
            e.preventDefault();
        }, { passive: false });

        // Для проверки на ноуте оставляем мышку
        area.addEventListener('mousemove', handleInput);

        btn.addEventListener('click', () => {
            if (isDone) {
                btn.style.opacity = 0;
                if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
                setTimeout(() => {
                    btn.style.display = 'none';
                    finalMsg.style.opacity = 1;
                }, 400);
            }
        });

        window.onload = () => {
            btn.style.left = `${(window.innerWidth - btn.offsetWidth) / 2}px`;
            btn.style.top = `${(window.innerHeight - btn.offsetHeight) / 2}px`;
        };
    </script>
</body>
</html>
